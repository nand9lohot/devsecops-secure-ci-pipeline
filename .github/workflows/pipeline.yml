name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install Tools
      run: bash scripts/install-tools.sh
      continue-on-error: true

    - name: SAST
      run: make sast

    - name: Secrets Scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: Dependency Scan
      run: make sca
      continue-on-error: true

    - name: Build Image
      run: make build
      continue-on-error: true

    - name: Container Scan
      run: make image-scan
      continue-on-error: true

    - name: Generate SBOM
      run: make sbom
      continue-on-error: true

    - name: Sign Image
      run: make sign
      continue-on-error: true

    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: reports/
name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    ####################################################
    # System dependencies required by several tools
    ####################################################
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jre unzip wget curl jq

    ####################################################
    # Ensure reports directory exists
    ####################################################
    - name: Prepare reports directory
      run: mkdir -p reports

    ####################################################
    # Setup Python (Semgrep requirement)
    ####################################################
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Semgrep
      run: |
        python -m pip install --upgrade pip
        pip install semgrep

    ####################################################
    # Install container security tools
    ####################################################
    - name: Install Trivy
      uses: aquasecurity/setup-trivy@v0.2.0

    - name: Install Syft
      uses: anchore/sbom-action/download-syft@v0

    - name: Install Grype
      uses: anchore/scan-action/download-grype@v3

    ####################################################
    # Install Cosign
    ####################################################
    - name: Install Cosign
      uses: sigstore/cosign-installer@v3

    ####################################################
    # Install Gitleaks
    ####################################################
    - name: Install Gitleaks
      run: |
        set -e
        VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name)
        wget -q https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz
        tar -xzf gitleaks_${VERSION#v}_linux_x64.tar.gz
        sudo mv gitleaks /usr/local/bin/

    ####################################################
    # Install OWASP Dependency Check
    ####################################################
    - name: Install OWASP Dependency Check
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jre unzip wget curl
        DC_VERSION="9.0.9"
        wget https://github.com/jeremylong/DependencyCheck/releases/download/v${DC_VERSION}/dependency-check-${DC_VERSION}-release.zip
        unzip dependency-check-${DC_VERSION}-release.zip
        sudo mv dependency-check /opt/
        sudo ln -s /opt/dependency-check/bin/dependency-check.sh /usr/local/bin/dependency-check

    ####################################################
    # Verify all tools are available
    ####################################################
    - name: Verify installed tools
      run: |
        which semgrep
        which trivy
        which syft
        which grype
        which gitleaks
        which cosign
        which dependency-check

    ####################################################
    # SAST Scan
    ####################################################
    - name: Run Semgrep SAST
      run: |
        mkdir -p reports
        semgrep \
          --config security/semgrep.yml \
          app/ \
          --json \
          --output reports/sast-report.json

    ####################################################
    # Secrets Scan
    ####################################################
    - name: Run Gitleaks
      run: |
        gitleaks detect \
        --source . \
        --report-format json \
        --report-path reports/secrets-report.json || true

    ####################################################
    # Dependency Scan (SCA)
    ####################################################
    - name: Cache Dependency Check DB
      uses: actions/cache@v4
      with:
        path: ~/.dependency-check
        key: dependency-check-${{ runner.os }}

    - name: Run Dependency Check
      run: |
        echo "Running Dependency Scan"
        dependency-check \
          --scan app \
          --format HTML \
          --out reports

    ####################################################
    # Build Image
    ####################################################
    - name: Build Image
      run: make build
      continue-on-error: true

    ####################################################
    # Container Vulnerability Scan
    ####################################################
    - name: Container Scan
      run: make image-scan
      continue-on-error: true

    ####################################################
    # Generate SBOM
    ####################################################
    - name: Generate SBOM
      run: make sbom
      continue-on-error: true

    ####################################################
    # Generate Cosign Keys
    ####################################################
    - name: Generate Cosign Key Pair
      env:
        COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
      run: |
        COSIGN_PASSWORD=$COSIGN_PASSWORD cosign generate-key-pair

    ####################################################
    # Sign Image
    ####################################################
    - name: Sign Image
      run: make sign
      continue-on-error: true

    ####################################################
    # Upload security reports
    ####################################################
    - name: Upload Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: reports/
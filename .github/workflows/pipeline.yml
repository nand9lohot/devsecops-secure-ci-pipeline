name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install Tools
      run: bash scripts/install-tools.sh

    - name: SAST
      run: make sast

    - name: Secrets Scan
      run: make secrets

    - name: Dependency Scan
      run: make sca

    - name: Build Image
      run: make build

    - name: Container Scan
      run: make image-scan

    - name: Generate SBOM
      run: make sbom

    - name: Sign Image
      run: make sign

    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: reports/